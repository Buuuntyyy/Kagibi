# Configuration rclone pour la réplication OVH → Scaleway
# Ce fichier est monté depuis un K8s Secret (ne jamais committer avec les vraies clés).
# Utilise les variables d'environnement à la place en production (voir CronJob YAML).

[ovh]
type = s3
provider = Other
env_auth = false
access_key_id     = ${S3_ACCESS_KEY}
secret_access_key = ${S3_SECRET_KEY}
endpoint          = ${S3_ENDPOINT}
region            = ${S3_REGION}
acl               = private

[scaleway]
type = s3
provider = Scaleway
env_auth = false
access_key_id     = ${S3_BACKUP_ACCESS_KEY}
secret_access_key = ${S3_BACKUP_SECRET_KEY}
endpoint          = ${S3_BACKUP_ENDPOINT}
region            = ${S3_BACKUP_REGION}
acl               = private
# Classe de stockage : STANDARD (1 zone), ONEZONE_IA, ou GLACIER selon le bucket
storage_class     = STANDARD
