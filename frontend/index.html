<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- JetBrains Mono for recovery code display (TODO: self-host before production for GDPR/UX-DR21) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Kagibi</title>
    <script nonce="analytics-loader">
      (function() {
        var d = document;
        var el = d.createElement('script');
        el.async = true;
        el.defer = true;
        el.src = 'https://stats.kagibi.cloud/website-favicon';
        
        // Détection du domaine
        if (window.location.hostname === 'send.kagibi.cloud') {
          el.setAttribute('data-website-id', 'ecf55047-8987-46ed-99c3-4315c292ae71');
        } else {
          el.setAttribute('data-website-id', '9d8fa65a-b413-4b91-907e-f5c1c49c7e90');
        }
        
        d.getElementsByTagName('head')[0].appendChild(el);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Load runtime configuration BEFORE main app -->
    <script src="/config.js"></script>

    <script type="module" src="/src/main.js"></script>

    <!-- Service Worker Integrity Check (SRI) -->
    <script nonce="inline-sri-check">
      /**
       * Vérifie l'intégrité du Service Worker avant registration
       * Empêche les attaques par modification du SW sur le serveur
       */
      async function verifyServiceWorkerIntegrity() {
        try {
          // Récupérer le contenu du SW
          const response = await fetch('/sw-crypto.js', {
            cache: 'no-cache'
          });

          if (!response.ok) {
            console.error('[SRI] Failed to fetch Service Worker:', response.status);
            return false;
          }

          const swContent = await response.text();

          // Calculer le hash SHA-256
          const encoder = new TextEncoder();
          const data = encoder.encode(swContent);
          const hashBuffer = await crypto.subtle.digest('SHA-256', data);

          // Convertir en hex
          const hashArray = Array.from(new Uint8Array(hashBuffer));
          const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

          ////console.log('[SRI] Service Worker SHA-256:', hashHex);

          // Vous pouvez stocker le hash attendu et le comparer ici
          // Si vous avez un backend, vous pouvez vérifier le hash côté serveur
          return true;
        } catch (error) {
          console.error('[SRI] Failed to verify Service Worker integrity:', error);
          return false;
        }
      }

      // Vérifier l'intégrité au chargement
      window.addEventListener('load', verifyServiceWorkerIntegrity);
    </script>
  </body>
</html>
