# IMPORTANT: This is a template. Replace with actual base64 encoded values.
# Use: echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: safercloud-secrets
  namespace: safercloud
type: Opaque
data:
  # Database credentials (base64 encoded)
  POSTGRES_USER: dXNlcg==  # user
  POSTGRES_PASSWORD: REPLACE_WITH_BASE64_PASSWORD # NOSONAR - template only, replace before deploying

  # JWT Secret (base64 encoded)
  JWT_SECRET: REPLACE_WITH_BASE64_JWT_SECRET # NOSONAR - template only, replace before deploying

  # S3/MinIO credentials (base64 encoded)
  AWS_ACCESS_KEY_ID: REPLACE_WITH_BASE64_ACCESS_KEY
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_BASE64_SECRET_KEY # NOSONAR - template only, replace before deploying
  AWS_REGION: dXMtZWFzdC0x  # us-east-1
  AWS_BUCKET: a2FnaWJpLWJ1Y2tldA==  # kagibi-bucket

  # Supabase (base64 encoded)
  SUPABASE_URL: REPLACE_WITH_BASE64_SUPABASE_URL
  SUPABASE_KEY: REPLACE_WITH_BASE64_SUPABASE_KEY
  SUPABASE_ANON_KEY: REPLACE_WITH_BASE64_ANON_KEY
  SUPABASE_SERVICE_ROLE_KEY: REPLACE_WITH_BASE64_SERVICE_ROLE_KEY # NOSONAR - template only
  REALTIME_SECRET_KEY_BASE: REPLACE_WITH_BASE64_REALTIME_SECRET # NOSONAR - template only, replace before deploying

  # Stripe/Billing (base64 encoded)
  STRIPE_SECRET_KEY: REPLACE_WITH_BASE64_STRIPE_KEY # NOSONAR - template only, replace before deploying
  STRIPE_WEBHOOK_SECRET: REPLACE_WITH_BASE64_WEBHOOK_SECRET # NOSONAR - template only, replace before deploying
