---
# Backend Deployment with HA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: safercloud
  labels:
    app: backend
    tier: application
spec:
  replicas: 3  # High Availability with 3 replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: application
    spec:
      imagePullSecrets:
        - name: ghcr-token  # Ensure this secret exists in the safercloud namespace
      affinity:
        # Ensure pods are distributed across different nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        image: ghcr.io/buuuntyyy/splatch:backend-v1.4.0  # Replace with your actual image
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        env:
        # Server Configuration
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: PORT
        - name: GIN_MODE
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: GIN_MODE
        # CORS Configuration
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: ALLOWED_ORIGINS
        # Database Configuration (Supabase PostgreSQL)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: DATABASE_URL
        # Redis Configuration (Upstash)
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: REDIS_URL
        # Supabase Configuration
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: SUPABASE_URL
        - name: SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: SUPABASE_ANON_KEY
        - name: SUPABASE_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: SUPABASE_JWT_SECRET
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: SUPABASE_SERVICE_ROLE_KEY
        # S3 Storage Configuration (OVH)
        - name: S3_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: S3_ENDPOINT
        - name: S3_REGION
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: S3_REGION
        - name: S3_BUCKET
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: S3_BUCKET
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: S3_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: S3_SECRET_KEY
        # Billing - Lago
        - name: BILLING_ENABLED
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: BILLING_ENABLED
        - name: LAGO_API_URL
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: LAGO_API_URL
        - name: LAGO_API_KEY
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: LAGO_API_KEY
        - name: LAGO_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: LAGO_WEBHOOK_SECRET
        - name: LAGO_BUFFER_SIZE
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: LAGO_BUFFER_SIZE
        - name: LAGO_FLUSH_INTERVAL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: LAGO_FLUSH_INTERVAL_SECONDS
        # Billing - Mollie
        - name: MOLLIE_API_KEY
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: MOLLIE_API_KEY
        - name: MOLLIE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: safercloud-secrets
              key: MOLLIE_WEBHOOK_SECRET
        - name: MOLLIE_TEST_MODE
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: MOLLIE_TEST_MODE
        - name: MOLLIE_REDIRECT_URL
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: MOLLIE_REDIRECT_URL
        - name: MOLLIE_WEBHOOK_URL
          valueFrom:
            configMapKeyRef:
              name: safercloud-config
              key: MOLLIE_WEBHOOK_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: safercloud
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: backend
  sessionAffinity: ClientIP  # Maintain session affinity for better performance
