---
# Website (Landing Page) Deployment with HA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: safercloud
  labels:
    app: website
    tier: presentation
spec:
  replicas: 2  # High Availability with 2 replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
        tier: presentation
    spec:
      affinity:
        # Ensure pods are distributed across different nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - website
              topologyKey: kubernetes.io/hostname
      containers:
      - name: website
        image: safercloud/website:latest  # Replace with your actual image
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
# Website Service
apiVersion: v1
kind: Service
metadata:
  name: website-service
  namespace: safercloud
  labels:
    app: website
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: website
