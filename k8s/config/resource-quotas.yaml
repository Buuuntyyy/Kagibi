---
# ResourceQuota for SaferCloud namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: safercloud-quota
  namespace: safercloud
spec:
  hard:
    # Compute resources
    requests.cpu: "50"
    requests.memory: "100Gi"
    limits.cpu: "100"
    limits.memory: "200Gi"

    # Storage resources
    requests.storage: "500Gi"
    persistentvolumeclaims: "20"

    # Object counts
    pods: "100"
    services: "50"
    configmaps: "50"
    secrets: "50"
    replicationcontrollers: "20"

    # Services by type
    services.loadbalancers: "5"
    services.nodeports: "10"

---
# LimitRange to set default limits for pods
apiVersion: v1
kind: LimitRange
metadata:
  name: safercloud-limits
  namespace: safercloud
spec:
  limits:
  # Pod limits
  - type: Pod
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "64Mi"

  # Container limits
  - type: Container
    max:
      cpu: "4"
      memory: "8Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    maxLimitRequestRatio:
      cpu: "4"
      memory: "4"

  # PersistentVolumeClaim limits
  - type: PersistentVolumeClaim
    max:
      storage: "200Gi"
    min:
      storage: "1Gi"

---
# Priority Classes for pod scheduling
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: safercloud-critical
value: 1000000
globalDefault: false
description: "Critical pods that must run (databases, core services)"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: safercloud-high
value: 100000
globalDefault: false
description: "High priority pods (backend, frontend)"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: safercloud-medium
value: 10000
globalDefault: false
description: "Medium priority pods (website, monitoring)"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: safercloud-low
value: 1000
globalDefault: false
description: "Low priority pods (backup jobs, batch processing)"
