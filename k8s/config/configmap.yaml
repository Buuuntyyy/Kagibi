apiVersion: v1
kind: ConfigMap
metadata:
  name: safercloud-config
  namespace: safercloud
data:
  # Server Configuration
  PORT: "8080"
  GIN_MODE: "release"

  # CORS Configuration
  ALLOWED_ORIGINS: "https://projet.stratus.ovh,https://kagibi.stratus.ovh"

  # S3 Storage Configuration
  S3_ENDPOINT: "https://s3.gra.io.cloud.ovh.net"
  S3_REGION: "gra"
  S3_BUCKET: "safercloud-prod"

  # Frontend Configuration
  VITE_API_URL: "https://kagibi.stratus.ovh/api/v1/"
  VITE_SUPABASE_URL: "https://api.stratus.ovh"

  # Supabase Database Configuration
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "postgres"

  # Supabase Meta Configuration
  PG_META_PORT: "8080"

  # Supabase Auth (GoTrue) Configuration
  GOTRUE_API_HOST: "0.0.0.0"
  GOTRUE_API_PORT: "9999"
  GOTRUE_SITE_URL: "https://app.safercloud.com"
  GOTRUE_URI_ALLOW_LIST: "https://app.safercloud.com"
  GOTRUE_DB_DRIVER: "postgres"
  GOTRUE_DB_DATABASE_URL: "postgres://POSTGRES_USER:POSTGRES_PASSWORD@postgres-service:5432/POSTGRES_DB?sslmode=disable"
  GOTRUE_JWT_EXP: "3600"
  GOTRUE_JWT_AUD: "authenticated"
  GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
  GOTRUE_MAILER_AUTOCONFIRM: "true"

  # Supabase Realtime Configuration
  DB_SSL: "disable"

  # Billing Configuration
  BILLING_ENABLED: "true"
  LAGO_API_URL: "https://api.getlago.com"
  LAGO_BUFFER_SIZE: "100"
  LAGO_FLUSH_INTERVAL_SECONDS: "30"
  MOLLIE_TEST_MODE: "false"
  MOLLIE_REDIRECT_URL: "https://kagibi.stratus.ovh/dashboard/billing"
  MOLLIE_WEBHOOK_URL: "https://kagibi.stratus.ovh/api/v1/webhooks/mollie"
