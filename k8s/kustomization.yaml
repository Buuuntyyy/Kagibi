# Kustomization for SaferCloud Kubernetes Deployment
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: safercloud

# Resources to include
resources:
  # Configuration
  - config/namespace.yaml
  - config/configmap.yaml
  - config/pod-disruption-budgets.yaml

  # Security
  - security/secrets.yaml
  - security/network-policies.yaml

  # Storage
  - storage/persistent-volumes.yaml

  # Databases
  - database/postgres-statefulset.yaml
  - database/redis-statefulset.yaml

  # Applications
  - backend/deployment.yaml
  - frontend/deployment.yaml
  - website/deployment.yaml

  # Autoscaling
  - autoscaling/hpa.yaml

  # Ingress
  - ingress/ingress.yaml

  # Monitoring
  - monitoring/prometheus-rules.yaml

  # Backup
  - backup/backup-cronjob.yaml

# Common labels for all resources
commonLabels:
  app.kubernetes.io/name: safercloud
  app.kubernetes.io/managed-by: kustomize
  environment: production

# Common annotations
commonAnnotations:
  deployed-by: kubernetes
  version: "1.0"

# Images to customize (optional - uncomment and modify as needed)
# images:
#   - name: safercloud/backend
#     newTag: v1.0.0
#   - name: safercloud/frontend
#     newTag: v1.0.0
#   - name: safercloud/website
#     newTag: v1.0.0

# ConfigMap generator (optional - for generating ConfigMaps from files)
# configMapGenerator:
#   - name: app-config
#     files:
#       - config/app.properties

# Secret generator (optional - for generating Secrets from files)
# secretGenerator:
#   - name: app-secrets
#     files:
#       - secrets/credentials.txt

# Patches (optional - for environment-specific overrides)
# patchesStrategicMerge:
#   - overlays/production/deployment-patch.yaml

# Replicas (optional - override default replicas)
# replicas:
#   - name: backend
#     count: 5
#   - name: frontend
#     count: 4
