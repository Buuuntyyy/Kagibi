---
# Ingress with Load Balancing and SSL/TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safercloud-ingress
  namespace: safercloud
  annotations:
    # NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: "nginx"
    # Si tu utilises un Secret existant, ne pas utiliser cert-manager
    # Décommenter SEULEMENT si tu veux que cert-manager génère les certificats:
    cert-manager.io/cluster-issuer: "letsencrypt-cluster-issuer"

    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # SSL Configuration
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"

    # Load balancing configuration
    nginx.ingress.kubernetes.io/load-balance: "round_robin"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"

    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # Timeout and buffer settings
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"

    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: "backend-service"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"

    # CORS configuration
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://projet.stratus.ovh"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Security headers and CSP
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'wasm-unsafe-eval' blob: 'sha256-0h/91TJDKk/c0hssvnCIOoZP6YUUYMkGOYJyt0ScwSU='; style-src 'self' 'unsafe-inline'; connect-src 'self' https://msshzlznpgrvdnowefbb.supabase.co https://s3.gra.io.cloud.ovh.net wss://msshzlznpgrvdnowefbb.supabase.co blob:; img-src 'self' data: blob:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; worker-src 'self' blob:;";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains";

spec:
  tls:
  # 🔒 Utiliser ton Secret existant qui contient le certificat Cloudflare
  # Remplacer "letsencrypt-cluster-issuer" par le nom de ton Secret si différent
  - hosts:
    - projet.stratus.ovh
    - kagibi.stratus.ovh
    secretName: letsencrypt-cluster-issuer

  rules:
  # Website (Landing Page) - projet.stratus.ovh
  - host: projet.stratus.ovh
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: website-service
            port:
              number: 80

  # Application Frontend - kagibi.stratus.ovh
  - host: kagibi.stratus.ovh
    http:
      paths:
      # Backend API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      # WebSocket
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8080
      # Frontend (must be last, catch-all)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
